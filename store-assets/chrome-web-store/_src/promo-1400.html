<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
	* { box-sizing: border-box; margin: 0; padding: 0; }
	html, body { width: 1400px; height: 560px; }
	body {
		background: #0a0a0a;
		color: #f5f5f5;
		font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
		-webkit-font-smoothing: antialiased;
		text-rendering: optimizeLegibility;
		display: flex;
		align-items: center;
		padding: 0 96px;
		gap: 80px;
		position: relative;
		overflow: hidden;
	}
	.glow-1 {
		position: absolute;
		width: 720px;
		height: 720px;
		left: -200px;
		top: -200px;
		background: radial-gradient(closest-side, rgba(34, 197, 94, 0.18), transparent 70%);
		pointer-events: none;
	}
	.glow-2 {
		position: absolute;
		width: 520px;
		height: 520px;
		right: -120px;
		bottom: -180px;
		background: radial-gradient(closest-side, rgba(255, 102, 0, 0.10), transparent 70%);
		pointer-events: none;
	}
	.left { display: flex; flex-direction: column; gap: 24px; max-width: 600px; z-index: 1; }
	.brand { display: flex; align-items: center; gap: 22px; }
	.logo {
		width: 96px;
		height: 96px;
		flex-shrink: 0;
		image-rendering: pixelated;
		image-rendering: crisp-edges;
		border-radius: 20px;
	}
	.wordmark {
		font-size: 72px;
		font-weight: 700;
		letter-spacing: -0.025em;
		line-height: 1;
		color: #f5f5f5;
	}
	.headline {
		font-size: 34px;
		line-height: 1.2;
		font-weight: 500;
		letter-spacing: -0.02em;
		color: #f5f5f5;
	}
	.headline em { color: #22c55e; font-style: normal; font-weight: 600; }
	.headline em.hn { color: #ff8a3d; }
	.sub {
		font-size: 18px;
		line-height: 1.45;
		color: #a3a3a3;
		letter-spacing: -0.005em;
		max-width: 540px;
	}
	.right {
		flex: 1;
		display: flex;
		justify-content: center;
		align-items: center;
		min-width: 0;
		z-index: 1;
	}
	.frame {
		width: 560px;
		border-radius: 14px;
		overflow: hidden;
		box-shadow:
			0 24px 60px rgba(0, 0, 0, 0.55),
			0 0 0 1px rgba(255, 255, 255, 0.06);
		transform: rotate(-1.5deg);
	}
	.frame img { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
	<div class="glow-1"></div>
	<div class="glow-2"></div>
	<div class="left">
		<div class="brand">
			<img class="logo" src="logo.png" alt="" />
			<div class="wordmark">Hackdrop</div>
		</div>
		<div class="headline"><em>GitHub Trending</em> and <em class="hn">Hacker News</em>, side&nbsp;by&nbsp;side, in every new&nbsp;tab.</div>
		<div class="sub">A clean, theme-aware new-tab page. No accounts, no settings, no tracking. Just two columns of what's new in software, every time you open a tab.</div>
	</div>
	<div class="right">
		<div class="frame"><img src="screenshot-dark.png" alt="" /></div>
	</div>
</body>
</html>
