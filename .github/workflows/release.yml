name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "tag to build (must already exist, e.g. v0.2.0)"
        required: true
        type: string

# default to no permissions; the build job re-grants what it actually needs.
permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build extension zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: resolve ref
        id: ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            ref="$INPUT_TAG"
          else
            ref="$REF_NAME"
          fi
          if ! printf '%s' "$ref" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ref '$ref' is not a v-prefixed semver tag" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: verify tag is on main
        env:
          REF: ${{ steps.ref.outputs.ref }}
        run: |
          # Refuse to release a tag pointing outside main's history. This stops a
          # compromised maintainer from pushing v9.9.9 at an arbitrary commit.
          tag_sha=$(git rev-parse "refs/tags/$REF^{commit}")
          if ! git merge-base --is-ancestor "$tag_sha" origin/main; then
            echo "tag $REF (=$tag_sha) is not an ancestor of origin/main" >&2
            exit 1
          fi

      - name: setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: setup node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: verify tag matches manifest version
        env:
          REF: ${{ steps.ref.outputs.ref }}
        run: |
          tag="${REF#v}"
          manifest=$(node -p "require('./extension/public/manifest.json').version")
          if [ "$tag" != "$manifest" ]; then
            echo "tag $REF does not match manifest.version $manifest" >&2
            exit 1
          fi

      - name: package extension
        run: pnpm --filter @hackdrop/extension package

      - name: upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: hackdrop-${{ steps.ref.outputs.ref }}
          path: extension/web-ext-artifacts/*.zip
          if-no-files-found: error

      - name: extract changelog section
        env:
          REF: ${{ steps.ref.outputs.ref }}
        run: |
          version="${REF#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { found=0 }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "no CHANGELOG.md section found for [$version]" >&2
            exit 1
          fi
          echo "--- release_notes.md ---"
          cat release_notes.md

      - name: create github release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.ref.outputs.ref }}
          files: extension/web-ext-artifacts/*.zip
          body_path: release_notes.md
          fail_on_unmatched_files: true
