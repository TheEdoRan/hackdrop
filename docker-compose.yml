services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: hackdrop-server
    container_name: hackdrop-server
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - proxy

networks:
  proxy:
    external: true
